name: leaderboard-daily

# Runs the full Capframe MCP-ecosystem leaderboard pipeline once a
# day. The Rust producer + aggregator can't easily run in a Vercel
# function — they need cargo build, multiple binaries, and minutes of
# runtime — so they live here. The Vercel side just revalidates ISR
# after this workflow has pushed a fresh sample.json.
#
# Pipeline:
#   1. Build mcp-recon binary from its repo (pinned commit/tag).
#   2. Build the capframe-leaderboard binary from THIS repo.
#   3. Run `mcp-recon producer registry` against the broad corpus.
#   4. Run `mcp-recon producer sandbox` against the sandbox corpus —
#      Docker handshake captures real `tools/list` (parameter schemas)
#      and OVERWRITES the same slug files the registry step just wrote.
#      Aggregator stays agnostic and just reads whichever file lands.
#   5. Run `mcp-recon producer registry` against the HTTP corpus —
#      same subcommand, but the handles are bare URLs so the producer
#      dispatches to the live HTTP path (`source: http`). These are
#      brand-new slugs, no overlap with the registry/sandbox passes.
#   6. Run `capframe-leaderboard build` to aggregate findings -> JSON.
#   7. Commit the refreshed sample.json into the capframe-website
#      repo (cross-repo push via a fine-grained PAT).
#
# Required secrets (configure in repo Settings -> Secrets):
#   LEADERBOARD_PUSH_TOKEN   PAT or App token with contents:write on
#                            github.com/capframe/website.

on:
  schedule:
    - cron: "0 7 * * *" # 07:00 UTC daily
  workflow_dispatch:
    # Manual trigger for testing the wiring; no inputs needed.

permissions:
  contents: read

concurrency:
  group: leaderboard-daily
  cancel-in-progress: false

env:
  RUST_BACKTRACE: "1"
  MCP_RECON_REPO: euanmcrosson-dotcom/mcp-recon
  MCP_RECON_REF: master # bump to a tag once mcp-recon cuts a release that includes the producer
  WEBSITE_REPO: capframe/website
  WEBSITE_SAMPLE_PATH: src/lib/leaderboard/sample.json
  WEBSITE_HISTORY_DIR: src/lib/leaderboard/history # archived per-run snapshots
  CORPUS_PATH: examples/registry-corpus.example.json # lives in mcp-recon
  SANDBOX_CORPUS_PATH: examples/sandbox-corpus.example.json # lives in mcp-recon
  HTTP_CORPUS_PATH: examples/http-corpus.example.json # lives in mcp-recon
  # Per-container wall-clock budget for the sandbox handshake (npm
  # install + initialize + tools/list). Keep generous; large packages
  # can install slowly inside the runner.
  SANDBOX_TIMEOUT_SECS: "240"

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout capframe (this repo)
        uses: actions/checkout@v6
        with:
          path: capframe

      - name: Checkout mcp-recon
        uses: actions/checkout@v6
        with:
          repository: ${{ env.MCP_RECON_REPO }}
          ref: ${{ env.MCP_RECON_REF }}
          path: mcp-recon

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-${{ runner.os }}-${{ hashFiles('capframe/Cargo.lock', 'mcp-recon/Cargo.lock') }}
          restore-keys: |
            cargo-${{ runner.os }}-

      - name: Build mcp-recon (release)
        working-directory: mcp-recon
        run: cargo build --release -p mcp-recon-cli

      - name: Build capframe-leaderboard (release)
        working-directory: capframe
        run: cargo build --release -p capframe-leaderboard

      - name: Run producer (registry path)
        working-directory: mcp-recon
        run: |
          mkdir -p ../findings
          ./target/release/mcp-recon producer registry \
            "${{ env.CORPUS_PATH }}" \
            --out-dir ../findings \
            --pretty

      # Sandbox path: capture live tools/list (incl. parameter schemas)
      # for the curated npm corpus. Each slug filename matches the
      # registry step above, so sandbox findings overwrite registry
      # findings for the same handle. This is how R1/R2/R4 actually
      # fire on the leaderboard — without it those rules stay dark.
      #
      # ubuntu-latest ships Docker pre-installed, so no docker setup
      # action is needed. Network egress required for `npm install`.
      - name: Verify Docker is available
        run: |
          docker --version
          docker pull node:20

      - name: Run producer (sandbox path, npm only)
        working-directory: mcp-recon
        run: |
          ./target/release/mcp-recon producer sandbox \
            "${{ env.SANDBOX_CORPUS_PATH }}" \
            --out-dir ../findings \
            --timeout-secs "${{ env.SANDBOX_TIMEOUT_SECS }}" \
            --pretty
          echo "--- post-sandbox findings (slug -> source) ---"
          for f in ../findings/*.findings.v2.json; do
            src=$(python3 -c "import json,sys; print(json.load(open(sys.argv[1]))['server']['source'])" "$f" 2>/dev/null || echo unknown)
            echo "  $(basename "$f") -> $src"
          done

      # HTTP path: scan live public/unauthenticated HTTP MCP endpoints.
      # `producer registry` dispatches on handle prefix, so a corpus of
      # `https://...` URLs naturally routes to the HTTP producer with
      # `source: http`. Brand-new slugs (URL-derived), no overlap with
      # the registry/sandbox passes, so no overwrite logic needed.
      # Failures here don't tank the cron — a dead endpoint just
      # `[err]`s and the leaderboard renders without that row.
      - name: Run producer (HTTP path)
        working-directory: mcp-recon
        run: |
          ./target/release/mcp-recon producer registry \
            "${{ env.HTTP_CORPUS_PATH }}" \
            --out-dir ../findings \
            --pretty
          echo "--- post-http findings count ---"
          ls -1 ../findings/https_*.findings.v2.json 2>/dev/null | wc -l || echo 0

      - name: Aggregate into leaderboard.json
        working-directory: capframe
        run: |
          ./target/release/capframe-leaderboard build \
            --findings ../findings \
            --out ../leaderboard.json \
            --pretty
          echo "--- preview ---"
          head -c 1024 ../leaderboard.json
          echo

      - name: Checkout capframe-website (with push token)
        uses: actions/checkout@v6
        with:
          repository: ${{ env.WEBSITE_REPO }}
          token: ${{ secrets.LEADERBOARD_PUSH_TOKEN }}
          path: website
          fetch-depth: 1

      # Archive the previous run before overwriting. The website ships
      # with a single live sample.json plus a history/ dir of dated
      # snapshots; the movers page diffs current vs the most recent
      # snapshot. We key the archive filename off the OLD file's
      # generated_at (not today's date) so workflow_dispatch reruns
      # don't collide with themselves.
      - name: Archive previous snapshot
        run: |
          mkdir -p "website/${{ env.WEBSITE_HISTORY_DIR }}"
          if [ -f "website/${{ env.WEBSITE_SAMPLE_PATH }}" ]; then
            prev_ts=$(python3 -c "import json; print(json.load(open('website/${{ env.WEBSITE_SAMPLE_PATH }}'))['generated_at'])")
            prev_date=$(echo "$prev_ts" | cut -c1-19 | tr ':' '-')
            archive="website/${{ env.WEBSITE_HISTORY_DIR }}/leaderboard-${prev_date}.json"
            cp "website/${{ env.WEBSITE_SAMPLE_PATH }}" "$archive"
            echo "archived previous snapshot -> $archive"
          else
            echo "no previous sample.json — nothing to archive"
          fi

      - name: Prune old snapshots (keep most recent 60)
        working-directory: website
        run: |
          dir="${{ env.WEBSITE_HISTORY_DIR }}"
          if [ -d "$dir" ]; then
            ls -1 "$dir"/leaderboard-*.json 2>/dev/null | sort | head -n -60 | xargs -r rm -v
          fi

      - name: Stage refreshed sample.json
        run: |
          mkdir -p "website/$(dirname "${{ env.WEBSITE_SAMPLE_PATH }}")"
          cp leaderboard.json "website/${{ env.WEBSITE_SAMPLE_PATH }}"

      - name: Commit + push (only if changed)
        working-directory: website
        env:
          GIT_AUTHOR_NAME: capframe-leaderboard-bot
          GIT_AUTHOR_EMAIL: euanmcrosson@gmail.com
          GIT_COMMITTER_NAME: capframe-leaderboard-bot
          GIT_COMMITTER_EMAIL: euanmcrosson@gmail.com
        run: |
          git add "${{ env.WEBSITE_SAMPLE_PATH }}" "${{ env.WEBSITE_HISTORY_DIR }}"
          if git diff --cached --quiet; then
            echo "no leaderboard change — skipping commit"
            exit 0
          fi
          git commit -m "chore(leaderboard): daily refresh $(date -u +%Y-%m-%d)"
          git push origin HEAD
