name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v0.1.0)'
        required: true

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
            use_cross: true
          - target: x86_64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip
          - target: aarch64-pc-windows-msvc
            os: windows-latest
            archive: zip

    steps:
      - uses: actions/checkout@v6

      - name: setup rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      - name: install cross
        if: matrix.use_cross == true
        run: cargo install cross --locked --version 0.2.5

      - name: build
        shell: bash
        run: |
          set -eu
          if [ "${{ matrix.use_cross }}" = "true" ]; then
            cross build --release --locked --target ${{ matrix.target }} -p capframe-cli
          else
            cargo build --release --locked --target ${{ matrix.target }} -p capframe-cli
          fi

      - name: package
        shell: bash
        run: |
          set -eu
          ver="${GITHUB_REF_NAME:-${{ github.event.inputs.tag }}}"
          name="capframe-${ver}-${{ matrix.target }}"
          mkdir -p dist "stage/$name"

          # bin extension
          if [[ "${{ matrix.target }}" == *windows* ]]; then
            ext=".exe"
          else
            ext=""
          fi

          cp "target/${{ matrix.target }}/release/capframe${ext}" "stage/$name/"
          cp README.md LICENSE "stage/$name/"

          if [ "${{ matrix.archive }}" = "zip" ]; then
            (cd stage && 7z a -tzip "../dist/${name}.zip" "$name" >/dev/null)
          else
            tar -czf "dist/${name}.tar.gz" -C stage "$name"
          fi

          # sha256 sidecar — filename only, matches install.sh expectations
          archive_name="${name}.${{ matrix.archive }}"
          (cd dist && \
            if command -v sha256sum >/dev/null 2>&1; then
              sha256sum "$archive_name" > "${archive_name}.sha256"
            else
              shasum -a 256 "$archive_name" > "${archive_name}.sha256"
            fi)

          echo "produced:"
          ls -lah dist/

      - uses: actions/upload-artifact@v7
        with:
          name: capframe-${{ matrix.target }}
          path: dist/*
          if-no-files-found: error
          retention-days: 1

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: list artifacts
        run: ls -lah dist/

      - name: create release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name || github.event.inputs.tag }}
          name: ${{ github.ref_name || github.event.inputs.tag }}
          files: dist/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
